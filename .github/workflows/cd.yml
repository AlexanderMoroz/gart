# CD: server Docker image -> GHCR -> Coolify deploy webhook.
# Manual trigger only until the Hetzner/Coolify box is provisioned;
# switch `on:` to push->main once COOLIFY_WEBHOOK_URL is configured.
name: Deploy server

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server:${{ github.sha }}
            ghcr.io/${{ github.repository }}/server:latest

      # TODO(coolify): add COOLIFY_WEBHOOK_URL secret, then:
      # - run: curl -fsSL -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}"
